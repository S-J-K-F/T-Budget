<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Requests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #2a2a3e;
            font-family: Arial;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 10px;
        }

        .title {
            background: #e8e8e8;
            padding: 15px;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .request-row {
            display: grid;
            grid-template-columns: 2fr 1fr 2fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .item-cell {
            background: #d8c8f0;
            padding: 15px;
            cursor: pointer;
        }

        .price-cell {
            background: #e8f0c8;
            padding: 15px;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 2px;
            border: none;
            cursor: pointer;
        }

        .approve { background: #7ec97e; }
        .deny { background: #e87575; }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h3 style="color:white;">Admin Panel</h3>
        </div>

        <div>
            <div class="profile-icon"></div>
            <button onclick="window.location='admin-profile.html'">Profile</button>
            <button onclick="window.location='index.html'">Home</button>
        </div>
    </div>

    <div class="title">Pending Requests</div>

    <div id="requestsContainer"></div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
    window.location.href = "login.html";
}

// ---------------- LOAD REQUESTS FROM SERVER ----------------
function loadRequests() {
    fetch("http://localhost:3000/api/requests")
        .then(res => res.json())
        .then(data => {

            const pending = data.filter(r => r.status === "pending");

            const container = document.getElementById("requestsContainer");
            container.innerHTML = "";

            if (pending.length === 0) {
                container.innerHTML = "<p style='color:white'>No pending requests</p>";
                return;
            }

            pending.forEach(req => {
                const row = document.createElement("div");
                row.className = "request-row";

                row.innerHTML = `
                    <div class="item-cell">
                        ${req.items.join(", ")}
                    </div>

                    <div class="price-cell">
                        User: ${req.user}
                    </div>

                    <div>
                        <button class="approve" onclick="approve(${req.id})">Approve</button>
                        <button class="deny" onclick="deny(${req.id})">Deny</button>
                    </div>
                `;

                container.appendChild(row);
            });
        });
}

// ---------------- APPROVE ----------------
function approve(id) {
    fetch(`http://localhost:3000/api/approve/${id}`, {
        method: "POST"
    })
    .then(() => loadRequests());
}

// ---------------- DENY ----------------
function deny(id) {
    fetch(`http://localhost:3000/api/deny/${id}`, {
        method: "POST"
    })
    .then(() => loadRequests());
}

// ---------------- INITIAL LOAD ----------------
loadRequests();

</script>

</body>
</html>
