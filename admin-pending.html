<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pending Requests</title>

    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: Arial;
        }

        header {
            background: #2d2d2d;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 8px 12px;
            margin-left: 10px;
            cursor: pointer;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #2d2d2d;
            border-left: 4px solid #f0a500;
            padding: 15px;
            margin-bottom: 10px;
        }

        .badge {
            background: #f0a500;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .actions {
            margin-top: 10px;
        }

        .approve {
            background: #4caf50;
            border: none;
            padding: 6px 10px;
            margin-right: 5px;
        }

        .deny {
            background: #d32f2f;
            border: none;
            padding: 6px 10px;
        }
    </style>
</head>

<body>

<header>
    <h2>Pending Requests</h2>

    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goProfile()">Profile</button>
    </div>
</header>

<div class="container" id="list"></div>

<script>

// ---------------- LOGIN CHECK ----------------
const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
    window.location.href = "login.html";
}

// ---------------- LOAD PENDING ----------------
function loadPending() {
    fetch("http://localhost:3000/api/requests")
        .then(res => res.json())
        .then(data => {

            const pending = data.filter(r => r.status === "pending");

            const list = document.getElementById("list");
            list.innerHTML = "";

            if (pending.length === 0) {
                list.innerHTML = "<p>No pending requests</p>";
                return;
            }

            pending.forEach(r => {
                const div = document.createElement("div");
                div.className = "card";

                div.innerHTML = `
                    <h3>${r.items.join(", ")}</h3>
                    <p><b>User:</b> ${r.user}</p>
                    <span class="badge">PENDING</span>

                    <div class="actions">
                        <button class="approve" onclick="approve(${r.id})">Approve</button>
                        <button class="deny" onclick="deny(${r.id})">Deny</button>
                    </div>
                `;

                list.appendChild(div);
            });
        });
}

// ---------------- ACTIONS ----------------
function approve(id) {
    fetch(`http://localhost:3000/api/approve/${id}`, {
        method: "POST"
    }).then(() => loadPending());
}

function deny(id) {
    fetch(`http://localhost:3000/api/deny/${id}`, {
        method: "POST"
    }).then(() => loadPending());
}

// ---------------- NAV ----------------
function goHome() {
    window.location.href = "admin-profile.html";
}

function goProfile() {
    window.location.href = "admin-profile.html";
}

// ---------------- RUN ----------------
loadPending();

</script>

</body>
</html>
