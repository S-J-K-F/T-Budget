<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --bg: #323244;
    --panel: #d4d3fa;
    --card: #efefff;
    --btn: #85a88c;
    --btn-alt: #a8c9a0;
}

body {
    background: var(--bg);
    font-family: "Segoe UI", Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* MAIN LAYOUT */
.container-box {
    width: 900px;
    background: var(--panel);
    border-radius: 10px;
    padding: 25px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* HEADER */
.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn-link {
    background: #8fa5ff;
    border: 2px solid #5460b0;
    padding: 8px 15px;
    font-weight: bold;
    border-radius: 5px;
}

.profile-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CART */
.cart-header {
    text-align: center;
    font-size: 28px;
    margin: 20px 0;
    font-weight: bold;
}

.cart-items {
    background: var(--card);
    border-radius: 8px;
    padding: 10px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    background: #bfbfbf;
    margin: 8px 0;
    padding: 12px;
    border-radius: 5px;
    font-size: 18px;
}

/* BUTTONS */
.remove-btn {
    background: #8f7a75;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
}

.action-row {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.checkout-btn {
    background: var(--btn);
    padding: 12px;
    border: none;
    border-radius: 5px;
    width: 48%;
}

.shop-btn {
    background: var(--btn-alt);
    padding: 12px;
    border: none;
    border-radius: 5px;
    width: 48%;
}
</style>
</head>

<body>

<div class="container-box">

    <!-- TOP NAV -->
    <div class="top-row">
        <button class="btn-link" onclick="go('index.html')">Home</button>
        <div class="profile-icon">👤</div>
        <button class="btn btn-primary" onclick="go('TeacherProfile.html')">Profile</button>
    </div>

    <!-- TITLE -->
    <div class="cart-header">Shopping Cart</div>

    <!-- ITEMS -->
    <div class="cart-items" id="cartItems"></div>

    <!-- ACTIONS -->
    <div class="action-row">
        <button class="checkout-btn" onclick="checkout()">Send Request</button>
        <button class="shop-btn" onclick="go('shop.html')">Cancel</button>
    </div>

</div>

<script>

// ---------------- LOAD CART ----------------
function loadCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("cartItems");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<div class='cart-item'>Cart is empty</div>";
        return;
    }

    cart.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            ${item}
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        `;

        container.appendChild(div);
    });
}

// ---------------- REMOVE ----------------
function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

// ---------------- CHECKOUT ----------------
function checkout() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    localStorage.setItem("requestItems", JSON.stringify(cart));
    window.location.href = "RequestIt.html";
}

// ---------------- NAV ----------------
function go(page) {
    window.location.href = page;
}

// ---------------- INIT ----------------
loadCart();

</script>

</body>
</html>
