<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #2a2a3e;
            padding: 16px;
            color: #333;
        }

        .home-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            background-color: #949CFF;
            color: #000;
            border: 2px solid #000;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        .home-btn:hover {
            opacity: 0.9;
        }

        .profile-section {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 1000;
        }

        .profile-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px solid #ccc;
            overflow: hidden;
        }

        .profile-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-btn {
            background-color: #e6b3ff;
            color: #000;
            border: 2px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .profile-btn:hover {
            opacity: 0.9;
        }

        .container {
            display: flex;
            gap: 24px;
            max-width: 1200px;
        }

        .left-section {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 40px;
        }

        .left-box {
            padding: 16px;
            border-radius: 4px;
            border: 2px solid #555;
        }

        .account-box {
            background-color: #a8c9a0;
            font-size: 18px;
            font-weight: bold;
        }

        .checkout-btn {
            background-color: #c9b896;
            color: #000;
            border: 2px solid #666;
            padding: 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }

        .checkout-btn:hover {
            opacity: 0.85;
        }

        .shop-btn {
            background-color: #a8c9a0;
            color: #000;
            border: 2px solid #555;
            padding: 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }

        .shop-btn:hover {
            opacity: 0.85;
        }

        .right-section {
            flex: 1;
            margin-top: 40px;
        }

        .cart-header {
            background-color: #e0e0e0;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            text-align: center;
        }

        .cart-items {
            background-color: #c0c0c0;
            border: 2px solid #999;
            border-radius: 0 0 4px 4px;
        }

        .cart-item {
            padding: 20px;
            border-bottom: 1px solid #999;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .cart-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <button class="home-btn">Home</button>

    <div class="profile-section">
        <div class="profile-icon">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_lvjjRAVDQ-nBDq_4dy1xCyRjjDaHV-Tqcw&s" alt="Profile">
        </div>
        <button onclick="go('index.html')" class="profile-btn">Profile</button>
    </div>

    <div class="container">
        <div class="left-section">
            <div class="left-box account-box">
                EX: Amount of $ Left in account
            </div>
            <button class="checkout-btn">Checkout</button>
            <button class="shop-btn">Shop</button>
        </div>

        <div class="right-section">
            <div class="cart-header">Shopping Cart</div>
            <div class="cart-items">
                <div class="cart-item">EX: Item 1</div>
                <div class="cart-item">EX: Item 1</div>
                <div class="cart-item">EX: Item 1</div>
                <div class="cart-item">EX: Item 1</div>
                <div class="cart-item">EX: Item 1</div>
            </div>
        </div>
    </div>
</body>
</html>
