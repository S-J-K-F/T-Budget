<!DOCTYPE html>
<html>

<head>
    <title>Teacher Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #2a2a3e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        .home-button {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .profile-section {
            text-align: center;
            padding: 40px 0;
        }
        .profile-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-color: #d3d3d3;
            margin: 0 auto 20px;
        }
        .profile-title {
            background-color: white;
            color: black;
            padding: 10px 20px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 40px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .btn-nav {
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 3px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .btn-home {
            background-color: #007bff;
            color: rgb(0, 0, 0);
        }
        .btn-history {
            background-color: #b4a8d5;
            color: black;
        }
        .btn-shop {
            background-color: #a8d5a8;
            color: black;
        }
    </style>
</head>

<body>
    <a href="index.html" class="btn btn-secondary home-button">Home</a>
    
    <div class="profile-section">
        <div class="profile-image"></div>
        <div class="profile-title">Your Profile</div>

        <div class="button-group">
            <a href="transaction_history.html" class="btn-nav btn-history">History</a>
            <a href="shopcart.html" class="btn-nav btn-shop">Cart</a>
            <a href="shop.html" class="btn-nav btn-shop">Shop</a>
        </div>
    </div>
</body>

</html>
