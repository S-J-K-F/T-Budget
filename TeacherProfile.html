<!DOCTYPE html>
<html>
<head>
    <title>Teacher Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #2a2a3e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            text-align: center;
        }

        button {
            margin: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 id="userInfo"></h2>

    <button onclick="go('shopping.html')" class="btn btn-success">Shop</button>
    <button onclick="go('shoppcartt.html')" class="btn btn-info">Cart</button>
    <button onclick="go('RequestIt.html')" class="btn btn-warning">Request</button>

    <br><br>
    <button id="logoutBtn" class="btn btn-danger">Logout</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
} else {
    document.getElementById("userInfo").innerText =
        "Logged in as: " + user.email;
}

function go(page) {
    window.location.href = page;
}

document.getElementById("logoutBtn").onclick = () => {
    localStorage.removeItem("user");
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/login.html";
};
</script>

</body>
</html>
