<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Requests</title>

    <!--bootstrap css linking-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <!-- bootstrap js linking-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="temp-style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #2a2a3e;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .search-section {
            flex: 1;
        }
        
        .search-box {
            background-color: #a0a0a0;
            padding: 15px;
            border-radius: 50px;
            font-size: 16px;
            color: #707070;
            border: none;
            width: 100%;
        }
        
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        
        .profile-icon {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .profile-btn {
            background-color: #d8b8f0;
            color: black;
            width: 120px;
        }
        
        .home-btn {
            background-color: #a8c8f0;
            color: black;
            width: 120px;
        }
        
        .title {
            background-color: #e8e8e8;
            padding: 20px;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .requests-table {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .request-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;
            align-items: center;
        }
        
        .item-cell {
            background-color: #d8c8f0;
            padding: 20px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .item-cell:hover {
            background-color: #c8b8e0;
        }
        
        .price-cell {
            background-color: #e8f0c8;
            padding: 20px;
            border-radius: 5px;
            font-size: 20px;
            text-align: center;
        }
        
        .approve-btn {
            background-color: #7ec97e;
            color: black;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background-color 0.3s;
        }
        
        .approve-btn:hover {
            background-color: #6eb96e;
        }
        
        .approve-btn.deny {
            background-color: #e87575;
        }
        
        .approve-btn.deny:hover {
            background-color: #d86565;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="search-section">
                <input type="text" class="search-box" id="searchInput" placeholder="Search items..." onkeyup="filterRequests()">
            </div>
            <div class="nav-buttons">
                <div class="profile-icon"></div>
                <button class="profile-btn" onclick="goToProfile()">Profile</button>
                <button class="home-btn" onclick="goToHome()">Home</button>
            </div>
        </div>
        
        <div class="title">Requests</div>
        
        <div class="requests-table" id="requestsContainer"></div>
    </div>
    
    <script>
        const requests = [
            { id: 1, item: "Whiteboard Markers", price: "$25.99" },
            { id: 2, item: "Projector Bulb", price: "$145.00" },
            { id: 3, item: "Desk Lamp", price: "$42.50" },
            { id: 4, item: "Classroom Supplies Kit", price: "$89.99" }
        ];
        
        function renderRequests(requestsToShow = requests) {
            const container = document.getElementById('requestsContainer');
            container.innerHTML = '';
            
            requestsToShow.forEach(request => {
                const row = document.createElement('div');
                row.className = 'request-row';
                row.id = `request-${request.id}`;
                row.innerHTML = `
                    <div class="item-cell" onclick="goToItemDetail(${request.id})">${request.item}</div>
                    <div class="price-cell">${request.price}</div>
                    <div>
                        <button class="approve-btn" onclick="approveRequest(${request.id})">Approve</button>
                        <button class="approve-btn deny" onclick="denyRequest(${request.id})">Deny</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }
        
        function filterRequests() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const filtered = requests.filter(request => 
                request.item.toLowerCase().includes(searchInput)
            );
            renderRequests(filtered);
        }
        
        function goToProfile() {
            window.location.href = 'admin-profile.html';
        }
        
        function goToHome() {
            window.location.href = 'index.html';
        }
        
        function goToItemDetail(id) {
            window.location.href = `item-detail.html?id=${id}`;
        }
        
        function approveRequest(id) {
            const requestIndex = requests.findIndex(r => r.id === id);
            if (requestIndex > -1) {
                const request = requests[requestIndex];
                // TODO: Add approval logic (e.g., send to database, email teacher, etc.)
                console.log(`Request ${id} approved:`, request);
                requests.splice(requestIndex, 1);
                document.getElementById(`request-${id}`).remove();
                alert(`Request "${request.item}" approved!`);
            }
        }
        //Both request and deny will probably need more functionality in the future, such as updating a database, sending notifications, etc. For now, they simply remove the request from the list and log the action.
        function denyRequest(id) {
            const requestIndex = requests.findIndex(r => r.id === id);
            if (requestIndex > -1) {
                const request = requests[requestIndex];
                // TODO: Add denial logic (e.g., send to database, email teacher, etc.)
                console.log(`Request ${id} denied:`, request);
                requests.splice(requestIndex, 1);
                document.getElementById(`request-${id}`).remove();
                alert(`Request "${request.item}" denied!`);
            }
        }
        
        renderRequests();
    </script>

</body>
</html>
