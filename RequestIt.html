<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RequestIt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #323244;
            --panel: #d4d3fa;
            --btn: #85a88c;
            --btn-no: #8f7a75;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial;
        }

        .container {
            max-width: 960px;
            width: 100%;
            padding: 30px;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-link {
            background: #8fa5ff;
            border: 2px solid #5460b0;
            font-size: 1.5rem;
            padding: 8px 16px;
            text-decoration: none;
        }

        .profile-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            padding: 15px 25px;
            font-size: 1.5rem;
        }

        .cart {
            width: 300px;
            background: #fff;
            border: 2px solid #bbb;
        }

        .title {
            padding: 10px;
            border-bottom: 2px solid #bbb;
            font-weight: bold;
        }

        .item {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .more {
            background: #ddd;
            padding: 10px;
            cursor: pointer;
        }

        .action-row {
            display: flex;
            gap: 40px;
        }

        button {
            width: 120px;
            height: 50px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .yes { background: var(--btn); }
        .no { background: var(--btn-no); }
    </style>
</head>

<body>

<main class="container">

    <div class="top-row">
        <a href="index.html" class="btn-link">Home</a>
        <div class="profile-icon">👤</div>
        <a href="TeacherProfile.html" class="btn btn-primary">Profile</a>
    </div>

    <div class="center">
        <div class="panel">Confirm Request?</div>

        <div class="cart">
            <div class="title">Shopping Cart Preview</div>
            <div id="cartItems"></div>
            <div class="more">More</div>
        </div>

        <div class="action-row">
            <button class="yes" id="yesBtn">Yes</button>
            <button class="no" id="noBtn">No</button>
        </div>
    </div>

</main>

<script>
    // --------------------------
    // LOAD CART FROM LOCAL STORAGE
    // --------------------------
    const cartItemsDiv = document.getElementById("cartItems");
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        cartItemsDiv.innerHTML = "<div class='item'>Cart is empty</div>";
    } else {
        cart.slice(0, 2).forEach(item => {
            const div = document.createElement("div");
            div.className = "item";
            div.textContent = item;
            cartItemsDiv.appendChild(div);
        });

        if (cart.length > 2) {
            const more = document.createElement("div");
            more.className = "item";
            more.textContent = "...";
            cartItemsDiv.appendChild(more);
        }
    }

    // --------------------------
    // NAVIGATION
    // --------------------------
    document.querySelector('.more').addEventListener('click', () => {
        window.location.href = 'shopping-cart.html';
    });

    document.querySelector('.profile-icon').addEventListener('click', () => {
        window.location.href = 'TeacherProfile.html';
    });

    // --------------------------
    // BUTTONS
    // --------------------------
    document.getElementById('yesBtn').addEventListener('click', () => {
        if (cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }

        const user = JSON.parse(localStorage.getItem("user"));

        fetch('/api/submit-request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                items: cart,
                user: user.email
            })
        })
        .then(res => {
            if (!res.ok) throw new Error();
            return res.json();
        })
        .then(() => {
            alert("Request sent to admin!");
            localStorage.removeItem("cart");
            window.location.href = "index.html";
        })
        .catch(() => {
            alert("No backend yet → request not actually sent.");
        });
    });

    document.getElementById('noBtn').addEventListener('click', () => {
        alert("Request canceled");
    });

    // --------------------------
    // DEMO DATA (REMOVE LATER)
    // --------------------------
    if (!localStorage.getItem("cart")) {
        localStorage.setItem("cart", JSON.stringify([
            "Pencils",
            "Notebook",
            "Markers"
        ]));
    }
</script>

</body>
</html>
