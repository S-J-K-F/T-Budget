<!DOCTYPE html>
<html>
<head>
    <title>Simple Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #323244;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #d4d3fa;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }

        button {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h3>Login</h3>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="btn btn-primary" onclick="loginTeacher()">Login as Teacher</button>
    <button class="btn btn-dark" onclick="loginAdmin()">Login as Admin</button>
</div>

<script>
function fakeLogin(role) {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // we don't validate anything
    localStorage.setItem("user", JSON.stringify({
        email: email || "guest",
        role: role
    }));

    if (role === "teacher") {
        window.location.href = "TeacherProfile.html";
    } else {
        window.location.href = "admin-profile.html";
    }
}

function loginTeacher() {
    fakeLogin("teacher");
}

function loginAdmin() {
    fakeLogin("admin");
}
</script>

</body>
</html>
