<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #2a2a3e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #d4d3fa;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: black;
            width: 300px;
        }

        button {
            width: 100%;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<div class="box">
    <h3>Admin Dashboard</h3>

    <button class="btn btn-primary" onclick="go('https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/admin-pending.html')">
        Pending Requests
    </button>

    <button class="btn btn-success" onclick="go('https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/admin-approved.html')">
        Approved Requests
    </button>

    <button class="btn btn-danger" onclick="go('https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/admin-denied.html')">
        Denied Requests
    </button>

    <button class="btn btn-dark" onclick="logout()">
        Logout
    </button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/login.html";
}

function go(page) {
    window.location.href = page;
}

function logout() {
    localStorage.removeItem("user");
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/index.html";
}
</script>

</body>
</html>
