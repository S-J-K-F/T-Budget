<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accepted Requests</title>

    <style>
        body {
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: Arial;
        }

        header {
            background: #2d2d2d;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 8px 12px;
            margin-left: 10px;
            cursor: pointer;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: #2d2d2d;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #4caf50;
        }

        .badge {
            background: #4caf50;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<header>
    <h2>Approved Requests</h2>

    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="goProfile()">Profile</button>
    </div>
</header>

<div class="container" id="list"></div>

<script>

// ---------------- LOGIN CHECK ----------------
const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/login.html";
}

// ---------------- LOAD APPROVED ----------------
function loadApproved() {
    fetch("http://localhost:3000/api/requests")
        .then(res => res.json())
        .then(data => {

            const approved = data.filter(r => r.status === "approved");

            const list = document.getElementById("list");
            list.innerHTML = "";

            if (approved.length === 0) {
                list.innerHTML = "<p>No approved requests</p>";
                return;
            }

            approved.forEach(r => {
                const div = document.createElement("div");
                div.className = "card";

                div.innerHTML = `
                    <h3>${r.items.join(", ")}</h3>
                    <p><strong>User:</strong> ${r.user}</p>
                    <p><strong>Status:</strong> Approved</p>
                    <span class="badge">Accepted</span>
                `;

                list.appendChild(div);
            });
        });
}

// ---------------- NAV ----------------
function goHome() {
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/admin-profile.html";
}

function goProfile() {
    window.location.href = "https://htmlpreview.github.io/?https://github.com/S-J-K-F/T-Budget/blob/main/admin-profile.html";
}

// ---------------- RUN ----------------
loadApproved();

</script>

</body>
</html>
