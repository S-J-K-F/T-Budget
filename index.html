<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        body {
            margin:0;
            padding: 40px;
            box-sizing: border-box;
            background-color: #3b3a44;
        }

        .container{
            max-width:900px;
            margin: 0 auto;
            display: flex;
            flex-direction:column;
            gap:60px;
        }

        .header{
            height:100px;
            background-color: #8fd34f;
            border: 2px solid black;
            text-align: center;
        }
        
        .main-box {
            background-color: #e3e3e3;
            border: 2px solid black;
            width: 100%;
            padding:20px;
        }
        
        .footerbox{
            height:80px;
            background-color: #e3e3e3;
            border:2px solid black;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>T-Budget Homepage</h1></div>
        <div class="main-box">
            <h2>Budget</h2>

            <label>Monthly Income</label><br>
            <input type="number" id="income" placeholder="Enter inclome"><br><br>
            
            
            <label>Expense Name:</label><br>
            <input type="text" id="income" placeholder="Enter inclome"><br><br>            


            <label>Expense Amount:</label><br>
            <input type="number" id="income" placeholder="Enter inclome"><br><br>

            <button id="addExpenseBtn">Add Expense</button>


            <h3>Expenses</h3>
            <ul id="expenseList>"ul></ul>
        </div>
        <div class="footerbox">
            <p><strong>Total Expenses:</strong> $<span id="totalExpenses">0</span></p>
            <p><strong>Money Left:</strong> $<span id="moneyLeft">0</span></p>
        </div>
    </div>Í
<script>
    const inputs = document.querySelectorAll("input");

    const incomeInput = inputs[0];
    const expenseNameInput = inputs[1];
    const expenseAmountInput = inputs[2];

    const addButton = document.getElementById("addExpenseBtn");
    const expenseList = document.querySelector("ul");

    const totalExpensesEl = document.getElementById("totalExpenses");
    const moneyLeftEl = document.getElementById("moneyLeft");

    let totalExpenses = 0;

    function updateMoneyLeft() {
        const income = Number(incomeInput.value) || 0;
        moneyLeftEl.textContent = income - totalExpenses;
    }

    function addExpense() {
        const name = expenseNameInput.value;
        const amount = Number(expenseAmountInput.value);

        if (name === "" || amount <= 0) {
            return;
        }

        const li = document.createElement("li");
        li.textContent = name + " - $" + amount;
        expenseList.appendChild(li);

        totalExpenses += amount;
        totalExpensesEl.textContent = totalExpenses;

        updateMoneyLeft();

        expenseNameInput.value = "";
        expenseAmountInput.value = "";
    }

    incomeInput.addEventListener("input", updateMoneyLeft);
    addButton.addEventListener("click", addExpense);

    expenseAmountInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            addExpense();
        }
    });
</script>

</body>
</html>
