<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Budget Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2a2a3e;
            font-family: Arial, sans-serif;
            color: #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #2a2a3e;
        }

        .search-box {
            width: 70%;
            padding: 12px;
            background-color: #999;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            color: #666;
        }

        .user-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background-color: #ddd;
            border-radius: 50%;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .profile-btn {
            background-color: #c67edb;
            color: white;
        }

        .home-btn {
            background-color: #7b9fd9;
            color: white;
        }

        .title {
            text-align: center;
            padding: 20px;
            background-color: #e8e8e8;
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 20px;
            border-radius: 4px;
        }

        .history-container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .history-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
        }

        .item-cell {
            background-color: #d4c5e8;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            font-size: 24px;
            border: 3px solid #2a2a3e;
        }

        .price-cell {
            background-color: #d4d9a8;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            font-size: 24px;
            border: 3px solid #2a2a3e;
        }

        .action-btn {
            background-color: #9bc197;
            color: #333;
            padding: 20px;
            border: 3px solid #2a2a3e;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .action-btn:hover {
            background-color: #85ad84;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" class="search-box" id="searchBox" placeholder="Search">
        <div class="user-section">
            <div class="avatar"></div>
            <div class="nav-buttons">
                <button class="profile-btn">Profile</button>
                <button class="home-btn">Home</button>
            </div>
        </div>
    </div>

    <div class="title">History</div>

    <div class="history-container"></div>
</body>
</html>
<script>
    // Sample purchase history data
    const purchaseHistory = [
        { id: 1, name: 'Laptop', price: '$899.99' },
        { id: 2, name: 'Wireless Mouse', price: '$29.99' },
        { id: 3, name: 'USB-C Cable', price: '$12.99' },
        { id: 4, name: 'Monitor Stand', price: '$49.99' }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        renderHistory(purchaseHistory);
        
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', filterHistory);
    });

    function renderHistory(items) {
        const container = document.querySelector('.history-container');
        container.innerHTML = '';

        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'history-row';
            row.innerHTML = `
                <div class="item-cell" style="cursor: pointer;" onclick="goToItemDetail(${item.id})">${item.name}</div>
                <div class="price-cell">${item.price}</div>
                <button class="action-btn">Add to Cart Again</button>
            `;
            container.appendChild(row);
        });
    }

    function filterHistory() {
        const searchValue = document.getElementById('searchBox').value.toLowerCase();
        const filtered = purchaseHistory.filter(item => 
            item.name.toLowerCase().includes(searchValue)
        );
        renderHistory(filtered);
    }

    function goToItemDetail(itemId) {
        window.location.href = `item-detail.html?id=${itemId}`;
    }
</script>
